<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Switcher Project</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div>
    <div class="main_div">
      <h1 class="main_heading common_in_heading">Color Changer</h1>
      <div class="btn_contain_div">
        <button class="random_clr_btn">Random Color</button>
        <input class="color_input_field" type="text" placeholder="Enter a color name to Set">
        <button class="apply_clr_btn" >Apply Color</button>
      </div>
      <h2 class="second_heading common_in_heading">Current Color: <span class="color_value_field"></span></h2>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
